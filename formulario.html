<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitar Informe | Viabilidad Predial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  margin:0;
  background:#f4f6f8;
  color:#1f2d3a;
}

/* HEADER */
.header{
  background:#1f2d3a;
  color:#fff;
  padding:50px 20px;
  text-align:center;
}

.header h1{margin:0;font-size:2rem;}
.header p{opacity:0.8;margin-top:10px;}

/* CONTENEDOR */
.container{
  max-width:800px;
  margin:auto;
  padding:40px 20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:12px;
  padding:30px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* FORM */
form{
  display:grid;
  gap:15px;
}

input, textarea, select{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:1rem;
  width:100%;
}

textarea{
  resize:vertical;
  min-height:100px;
}

/* BOTÓN */
.btn{
  background:#2f6f73;
  color:#fff;
  padding:14px;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{background:#24585c;}

/* CONTACTO */
.contact{
  margin-top:25px;
  padding-top:20px;
  border-top:1px solid #ddd;
  font-size:0.95rem;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:#1f2d3a;
  color:#fff;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Solicitar Informe de Viabilidad Predial</h1>
  <p>Completa el formulario y recibirás una respuesta en breve</p>
</div>

<div class="container">

  <div class="card">

    <!-- FORMULARIO -->
    <form action="https://formsubmit.co/frasserzambrano@gmail.com" method="POST">

      <input type="text" name="nombre" placeholder="Nombre completo" required>

      <input type="tel" name="telefono" placeholder="Número de celular" required>

      <input type="email" name="email" placeholder="Correo electrónico" required>

      <input type="text" name="ubicacion" placeholder="Ubicación del predio (ciudad / municipio)" required>

      <input type="text" name="coordenadas" placeholder="Coordenadas (opcional)">

      <select name="tipo_solicitud" required>
        <option value="">Tipo de solicitud</option>
        <option>Evaluación de viabilidad</option>
        <option>Compra de lote</option>
        <option>Licencia de construcción</option>
        <option>Otro</option>
      </select>

      <textarea name="mensaje" placeholder="Información adicional del predio"></textarea>

      <!-- CONFIGURACIÓN FORMSUBMIT -->
      <input type="hidden" name="_subject" value="Nueva solicitud de informe predial">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="gracias.html">

      <button type="submit" class="btn">Enviar solicitud</button>

    </form>

    <!-- DATOS DE CONTACTO -->
    <div class="contact">
      <strong>Ing. Frasser Augusto Zambrano Salazar</strong><br>
      Urbanista<br><br>
      📱 314 442 9234<br>
      📧 frasserzambrano@gmail.com
    </div>

  </div>

</div>

<div class="footer">
  © 2026 Servicios de Análisis Territorial
</div>

</body>
</html>

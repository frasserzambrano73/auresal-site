<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Inscripción | Diplomado AUR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f4f6f8;color:#1f2d3a;margin:0;padding:0;}
.container{max-width:600px;margin:50px auto;padding:20px;background:#fff;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
h1{color:#2f6f73;text-align:center;margin-bottom:20px;}
label{display:block;margin-top:15px;font-weight:600;}
input[type=text], input[type=email], input[type=number]{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc;}
button{background:#2f6f73;color:#fff;padding:12px 20px;border:none;border-radius:8px;margin-top:20px;cursor:pointer;font-weight:600;width:100%;}
button:hover{background:#8c5a3c;}
.cupon{background:#e8f0f2;padding:20px;border-radius:14px;margin-top:30px;text-align:center;display:none;}
.cupon img{max-width:200px;margin:10px 0;}
</style>
</head>
<body>

<div class="container">
<h1>Inscripción Diplomado AUR</h1>
<form id="formInscripcion">
<label>Nombre completo</label>
<input type="text" name="nombre" required>
<label>Cédula</label>
<input type="number" name="cedula" required>
<label>Teléfono</label>
<input type="text" name="telefono" required>
<label>Email</label>
<input type="email" name="email" required>
<label>Valor</label>
<input type="valor" name="valor" required>
<label>  
<input type="checkbox" name="terminos" required> Acepto términos y condiciones
</label>
<button type="submit">Generar Cupón de Pago</button>
</form>

<div class="cupon" id="cupon">
<h2>🎫 Cupón de Pago</h2>
<p>Si desea pagar directamente, escanee el QR o vaya a cualquier sucursal de Bancolombia</p>
<p>Envíe foto o pantallazo del pago a: frasserzambrano@gmail.com</p>
<div id="datosUsuario"></div>
<img src="img/proyectos/qr_pago.png" alt="QR de Pago">
</div>
</div>

<script>
// Guardar formulario en Google Sheets (opcional)
// Aquí podrías integrar Google Forms POST o API de Sheets

const form = document.getElementById('formInscripcion');
const cupon = document.getElementById('cupon');
const datosUsuario = document.getElementById('datosUsuario');

form.addEventListener('submit', function(e){
  e.preventDefault();
  const nombre = form.nombre.value;
  const cedula = form.cedula.value;
  const telefono = form.telefono.value;
  const email = form.email.value;
  const valor = form.valor.value;
  // Mostrar datos en cupón
  datosUsuario.innerHTML = `<p><b>Nombre:</b> ${nombre}</p>
                            <p><b>Cédula:</b> ${cedula}</p>
                            <p><b>Teléfono:</b> ${telefono}</p>
                            <p><b>Email:</b> ${email}</p>
                            <p><b>valor:</b> ${valor}</p>`;
  cupon.style.display = 'block';
  // Aquí se puede enviar POST a Google Sheets o formulario para almacenar
  alert('¡Cupón generado! Siga las instrucciones para el pago.');
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURESAL - Contacto</title>
<style>
:root{
  --color-agua:#2f6f73;
  --color-tierra:#8c5a3c;
  --color-arena:#c9a27e;
  --color-oscuro:#2c3e50;
  --color-claro:#f4f6f8;
  --color-blanco:#ffffff;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter', sans-serif; background:var(--color-claro); color:var(--color-oscuro); line-height:1.6; }

.header {
  background: linear-gradient(135deg, var(--color-oscuro), var(--color-agua));
  color: var(--color-blanco);
  padding: 30px 20px;
  text-align: center;
}
.header h1 { font-size:2rem; margin-bottom:10px; }

.back-btn {
  display:inline-block;
  background: rgba(255,255,255,0.2);
  color: var(--color-blanco);
  padding:10px 25px;
  text-decoration:none;
  border-radius:25px;
  margin-top:15px;
  transition:0.3s;
}
.back-btn:hover { background: rgba(255,255,255,0.3); }

.container { max-width:800px; margin:40px auto; padding:0 20px; }

.contact-card {
  background: var(--color-blanco);
  border-radius:12px;
  padding:30px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.contact-info {
  background: linear-gradient(135deg, #e8f4f8, #f0f9ff);
  padding:25px;
  border-radius:8px;
  margin-bottom:30px;
  text-align:center;
}
.contact-info p { margin:10px 0; font-size:1.1rem; color:var(--color-oscuro); }

form { display:grid; gap:20px; }

label {
  display:block;
  margin-bottom:8px;
  font-weight:bold;
  color: var(--color-oscuro);
}

input, textarea, select {
  width:100%;
  padding:15px;
  border:2px solid #ddd;
  border-radius:8px;
  font-size:1rem;
  transition:0.3s;
  font-family:inherit;
}

input:focus, textarea:focus, select:focus {
  outline:none;
  border-color: var(--color-agua);
}

textarea { resize:vertical; min-height:150px; }

button {
  background: var(--color-agua);
  color: var(--color-blanco);
  padding:15px 40px;
  border:none;
  border-radius:8px;
  font-size:1.1rem;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(47,111,115,0.4);
}

.footer {
  text-align:center;
  padding:30px;
  background: var(--color-oscuro);
  color: var(--color-blanco);
  margin-top:40px;
  font-size:0.9rem;
}
</style>
</head>
<body>

<div class="header">
  <h1>📬 Contacto</h1>
  <a href="index.html" class="back-btn">← Volver al Inicio</a>
</div>

<div class="container">
  <div class="contact-card">
    <div class="contact-info">
      <p>📧 <strong>Email:</strong> frasserzambrano@gmail.com</p>
      <p>📱 <strong>Teléfono:</strong> +57 314 442 9234</p>
      <p>👤 <strong>Contacto:</strong> Frasser Zambrano</p>
    </div>
    
    <form>
      <div>
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Su nombre completo">
      </div>
      
      <div>
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required placeholder="su@correo.com">
      </div>
      
      <div>
        <label for="asunto">Asunto</label>
        <select id="asunto" name="asunto">
          <option value="">Seleccione un asunto</option>
          <option value="servicios">Servicios</option>
          <option value="proyectos">Proyectos</option>
          <option value="donaciones">Donaciones</option>
          <option value="otros">Otros</option>
        </select>
      </div>
      
      <div>
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" required placeholder="Escriba su mensaje aquí..."></textarea>
      </div>
      
      <button type="submit">Enviar Solicitud</button>
    </form>
  </div>
</div>

<div class="footer">
  <p>📧 frasserzambrano@gmail.com • 📱 +57 314 442 9234</p>
  <p>© 2025 Fundación Agua y Urbanismo – AURESAL</p>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURA | Agua y Urbanismo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--agua:#2f6f73;
--tierra:#8c5a3c;
--arena:#c9a27e;
--oscuro:#1f2d3a;
--claro:#f4f6f8;
--blanco:#ffffff;
--gradiente:linear-gradient(135deg,var(--agua),var(--tierra));
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--claro);color:var(--oscuro);} 

a{text-decoration:none;color:inherit;}

/* NAV */
.navbar{
position:fixed;top:0;width:100%;
background:rgba(31,45,58,0.95);
display:flex;justify-content:space-between;
align-items:center;
padding:12px 30px;z-index:1000;
}

.logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:600;}
.logo img{height:40px;}

.menu a{color:#fff;margin-left:20px;font-size:0.9rem;opacity:0.9;}
.menu a:hover{opacity:1;}

/* HERO */
.hero{
margin-top:70px;
min-height:92vh;
background:
linear-gradient(rgba(0,0,0,0.5), rgba(47,111,115,0.85)),
url('img/hero/hero_paramo.jpg') center/cover no-repeat;
display:flex;align-items:center;justify-content:center;
text-align:center;color:#fff;padding:20px;
}

.hero h1{font-size:3.2rem;margin-bottom:15px;font-weight:700;}
.hero p{font-size:1.2rem;margin-bottom:25px;max-width:750px;margin-inline:auto;opacity:0.95;}
.hero .subline{margin-top:10px;font-size:0.95rem;opacity:0.85;}

.btn-primary{
background:var(--gradiente);
color:#fff;
</html>
